name: Python Package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheel:
    name: Build universal wheel
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: bindings/python/pyproject.toml

      - name: Cache Clojure dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-${{ runner.arch }}-clojure-${{ hashFiles('deps.edn', 'build.clj') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-clojure-

      - name: Build wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip "setuptools>=69" wheel
          python -m pip wheel --no-deps --no-build-isolation ./bindings/python -w dist/
          ls -lh dist/
          python - <<'PY'
          from pathlib import Path

          wheels = sorted(Path("dist").glob("datalevin-*-py3-none-any.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected one universal wheel, found: {wheels}")
          print(wheels[0])
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel
          path: dist/datalevin-*-py3-none-any.whl
          if-no-files-found: error

  smoke-wheel:
    name: Smoke test wheel on ${{ matrix.os }}
    needs: build-wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04-arm
          - macos-14
          - windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: python-wheel
          path: dist/

      - name: Smoke test wheel
        shell: bash
        run: ./script/test-python-package --python python dist/datalevin-*.whl
